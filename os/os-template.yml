# =============================================================================
# os-template.yml — Instance 設定の唯一の入口
# =============================================================================
#
# このファイルは 02_OS_Template_Spec.md Section 4.1 に基づく。
# CI と scripts/run はこのファイルの commands を読んで実行する。
#
# 運用ルール（Section 4.1.2）:
#   - commands.lint と commands.test は必ず埋めること（空は禁止）
#   - typecheck がない言語は空でOK（.ai-context.md に理由を記載）
#   - runtime.mode=docker を推奨（言語差分吸収が最も安定）
# =============================================================================

schema_version: "1"

# ---------------------------------------------------------------------------
# project: プロジェクト識別情報
# ---------------------------------------------------------------------------
project:
  name: "CurtainCall"
  owner: "a2m-m"
  description: "カーテンコール — Next.js + TypeScript で実装する2人用カードゲーム"

# ---------------------------------------------------------------------------
# runtime: 実行環境の設定
# ---------------------------------------------------------------------------
runtime:
  mode: "host"                        # "docker" | "host" — Node.js をホスト実行
  docker_image: ""                    # mode=host のため未使用
  host_setup_steps: ["npm ci"]        # 依存インストール

# ---------------------------------------------------------------------------
# commands: scripts/run が実行するコマンド定義
# ---------------------------------------------------------------------------
# CI とローカル実行はこのセクションのコマンドを叩くことで統一される。
# lint と test は必須。空のままだと scripts/run doctor で警告、CI では失敗扱いとなる。
# ---------------------------------------------------------------------------
commands:
  format: ""                          # optional: Issue #2 で設定予定（Prettier）
  lint: "echo 'skip'"                 # TODO: Issue #2 で ESLint を設定する
  typecheck: "npx tsc --noEmit"       # TypeScript strict mode チェック
  test: "echo 'skip'"                 # TODO: Issue #2 で Vitest を設定する
  build: "npm run build"              # Next.js ビルド
  ci: ""                              # optional: 空なら run が lint → typecheck → test を順に実行

# ---------------------------------------------------------------------------
# features: 機能の ON/OFF
# ---------------------------------------------------------------------------
features:
  ci: true                            # CI自動実行
  secret_scan: true                   # シークレット検知
  dependency_scan: true               # 依存パッケージ脆弱性スキャン
  guardrail: true                     # AI 監査レビュー（PRコメント）
  # lcg を有効化する場合はリポジトリシークレットに GEMINI_API_KEY を必ず設定してください
  lcg: false                          # Learning Content Generator（段階導入のためデフォルト OFF）

# ---------------------------------------------------------------------------
# policy: プロジェクトポリシー
# ---------------------------------------------------------------------------
policy:
  allow_skip_typecheck: true          # true の場合、typecheck 空でもOK（.ai-context.md に理由を記載）
  max_diff_warning: 1200              # PR の行数目安（超過で警告）
  max_file_warning: 30                # PR のファイル数目安（超過で警告）
